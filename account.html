<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyFridge • Account</title>
  <meta name="theme-color" content="#19705d" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css?v=301" />
</head>
<body class="app-page">
  <header class="topbar">
    <div class="topbar__left">
      <a href="dashboard.html" class="icon-btn icon-btn--light link-reset">←</a>
      <div>
        <h1 class="topbar__title">Account Info</h1>
        <p class="topbar__subtitle">Your signed-in profile</p>
      </div>
    </div>
  </header>

  <main class="app-shell">
    <section class="glass-card section">
      <div class="section-head">
        <div>
          <h2>Profile</h2>
          <p>Live details from your account.</p>
        </div>
      </div>

      <div class="info-grid">
        <div class="info-item">
          <span class="info-label">Email</span>
          <strong id="profileEmail">Loading...</strong>
        </div>
        <div class="info-item">
          <span class="info-label">User ID</span>
          <strong id="profileId">Loading...</strong>
        </div>
        <div class="info-item">
          <span class="info-label">Saved fridge code</span>
          <strong id="profileFridgeCode">Loading...</strong>
        </div>
      </div>
    </section>

    <section class="glass-card section">
      <div class="section-head">
        <div>
          <h2>Quick Actions</h2>
          <p>Move around the app quickly.</p>
        </div>
      </div>
      <div class="stack">
        <a class="btn btn-secondary btn-full link-reset" href="dashboard.html">Back to Dashboard</a>
        <a class="btn btn-accent btn-full link-reset" href="settings.html">Open Settings</a>
        <button id="logoutBtn" class="btn btn-danger btn-full" type="button">Log Out</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>MyFridge • Account center</p>
  </footer>

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="common.js?v=301"></script>
  <script defer src="account.js?v=301"></script>
</body>
</html>
