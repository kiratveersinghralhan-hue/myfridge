<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyFridge</title>

  <link rel="icon" type="image/png" href="icon-192.png?v=2">
  <link rel="apple-touch-icon" href="icon-512.png">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2ecc71">
</head>
<body>

  <header class="app-header">
    <h1>MyFridge</h1>
    <p>Track your food. Reduce waste.</p>
  </header>

  <main class="container">

    <input
  type="text"
  id="fridgeCode"
  placeholder="Enter fridge code (e.g. Ralhan-Home)"
  style="width:100%;padding:10px;margin-top:10px;margin-bottom:10px;"
>

    <input
      type="text"
      id="searchInput"
      placeholder="Search food..."
      style="width:100%;padding:10px;margin-top:10px;margin-bottom:10px;"
    >

    <button id="addBtn" style="width:100%;padding:10px;margin-bottom:10px;">+ Add item</button>

    <div id="formBox" style="display:none;margin-top:10px;">
      <input type="text" id="itemName" placeholder="Food name" style="width:100%;padding:10px;margin-bottom:10px;">
      <label for="expiryDate" style="font-size:13px;color:#555;">Expiry date</label>
      <small style="color:#888;display:block;margin-bottom:6px;">Tap to select a date</small>
      <input type="date" id="expiryDate" style="width:100%;padding:10px;margin-bottom:10px;">
      <button id="saveBtn" style="width:100%;padding:10px;margin-top:5px;">Save</button>
    </div>

    <ul id="itemList"></ul>

  </main>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>

<script defer src="supabase.min.js"></script>
<script defer src="app.js"></script>

</body>
</html>
