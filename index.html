<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyFridge</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <h1>🧊 MyFridge</h1>
    <p>Smart food tracking</p>
  </header>

  <main class="container">

    <div id="statusBox" class="status">Sync: checking...</div>

    <input id="fridgeCode" placeholder="Enter fridge code" class="input">
    <button id="useFridgeBtn" class="btn secondary">Use Fridge</button>

    <input id="searchInput" placeholder="Search items..." class="input">

    <button id="addBtn" class="btn primary">+ Add Item</button>

    <div id="formBox" class="form" style="display:none;">
      <input id="itemName" placeholder="Food name" class="input">

      <label>Expiry Date</label>
      <input type="date" id="expiryDate" class="input">

      <button id="saveBtn" class="btn save">Save</button>
    </div>

    <ul id="itemList"></ul>

  </main>

  <script defer src="supabase.min.js"></script>
  <script defer src="app.js"></script>

</body>
</html>
